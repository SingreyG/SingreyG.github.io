<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kitcho Mutfak Asistani</title>
    <style>
      :root { --bg:#edf6ef; --panel:rgba(255,255,255,.88); --text:#2c3e2e; --muted:#5d725d; --accent:#9caf88; --border:rgba(255,255,255,.72); }
      * { box-sizing:border-box; }
      body { margin:0; font-family:"Segoe UI", Arial, sans-serif; color:var(--text); background:radial-gradient(circle at top, rgba(156,175,136,.22), transparent 36%), linear-gradient(180deg,#f8fbf7 0%, var(--bg) 100%); }
      .wrap { max-width:980px; margin:0 auto; padding:32px 16px 56px; }
      .card { background:var(--panel); border:1px solid var(--border); border-radius:28px; padding:24px; box-shadow:0 18px 40px rgba(93,114,93,.08); backdrop-filter:blur(16px); }
      .grid { display:grid; gap:18px; margin-top:18px; }
      .eyebrow { color:var(--accent); font-size:12px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; }
      h1 { margin:12px 0 0; font-size:2rem; }
      p { color:var(--muted); line-height:1.75; }
      .links { display:grid; gap:12px; margin-top:18px; }
      a { display:block; text-decoration:none; color:var(--text); background:rgba(255,255,255,.9); border:1px solid var(--border); border-radius:20px; padding:14px 16px; font-weight:600; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <div class="eyebrow">Kitcho Mutfak Asistani</div>
        <h1>Yasal Sayfalar ve Destek</h1>
        <p>Kitcho Mutfak Asistani icin privacy, terms, support ve account deletion sayfalarina buradan ulasabilirsin.</p>
        <div class="links">
          <a href="/kitcho/privacy-policy/">Gizlilik Politikasi</a>
          <a href="/kitcho/terms/">Kullanim Kosullari</a>
          <a href="/kitcho/support/">Destek</a>
          <a href="/kitcho/account-deletion/">Hesap Silme</a>
        </div>
      </section>
    </main>
  </body>
</html>
